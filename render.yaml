# Render.com deployment configuration for Paperclip
# https://render.com/docs/blueprint-spec
#
# Quick start:
#   1. Push this repo to GitHub / GitLab
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo — Render detects this file automatically
#   4. Fill in the secret environment variables when prompted
#   5. Click "Apply"
#
# For DATABASE_URL: provision a Render Postgres instance (see the `databases`
# section below) or paste a connection string from Supabase / Neon / Railway.

services:
  - type: web
    name: paperclip
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Change to your preferred region: oregon, frankfurt, singapore, ohio, virginia
    region: oregon
    plan: starter   # starter | standard | pro — upgrade for more CPU/RAM
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "3100"
      - key: SERVE_UI
        value: "true"
      - key: PAPERCLIP_HOME
        value: "/paperclip"
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: "authenticated"
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: "public"

      # Render sets this automatically from your service URL — override if using
      # a custom domain.
      - key: PAPERCLIP_PUBLIC_URL
        sync: false   # set in Render dashboard (e.g. https://paperclip.onrender.com)

      # Required secrets — set these in the Render dashboard, not here.
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false   # generate: openssl rand -base64 32

      # Optional LLM provider keys
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

    disk:
      name: paperclip-data
      mountPath: /paperclip
      sizeGB: 10

# Optional: provision a managed Postgres database on Render.
# If you prefer an external database (Supabase, Neon, etc.) delete this section
# and set DATABASE_URL manually above.
#
# databases:
#   - name: paperclip-db
#     plan: starter
#     region: oregon
#     databaseName: paperclip
#     user: paperclip
