# Ingress template — requires an ingress controller (e.g. ingress-nginx, Traefik).
# Replace paperclip.example.com with your actual hostname.
# TLS: provision a cert manually or use cert-manager (https://cert-manager.io).
#
# Install cert-manager (optional):
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
# Then uncomment the cert-manager annotations and tls section below.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperclip
  namespace: paperclip
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # cert-manager.io/cluster-issuer: letsencrypt-prod   # uncomment for auto TLS
spec:
  ingressClassName: nginx    # change if using a different controller
  rules:
    - host: paperclip.example.com    # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperclip
                port:
                  name: http
  # Uncomment when TLS is configured:
  # tls:
  #   - hosts:
  #       - paperclip.example.com
  #     secretName: paperclip-tls
