# Secret template — DO NOT commit real values.
# Populate with base64-encoded values or use a secrets manager / external-secrets operator.
#
# Quick base64 encoding:
#   echo -n 'my-value' | base64
#
# Or apply directly with kubectl:
#   kubectl create secret generic paperclip-secrets \
#     --namespace paperclip \
#     --from-literal=database-url='postgres://user:pass@host:5432/db' \
#     --from-literal=better-auth-secret='$(openssl rand -base64 32)' \
#     --from-literal=anthropic-api-key='sk-ant-...' \
#     --from-literal=openai-api-key='sk-...'
apiVersion: v1
kind: Secret
metadata:
  name: paperclip-secrets
  namespace: paperclip
type: Opaque
data:
  # Required
  database-url: ""         # base64(postgres://user:pass@host:5432/db)
  better-auth-secret: ""   # base64(openssl rand -base64 32)
  # Optional — remove entries you don't need
  anthropic-api-key: ""    # base64(sk-ant-...)
  openai-api-key: ""       # base64(sk-...)
